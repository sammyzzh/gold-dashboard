<style>
  :root{
    --bg:#0F1419;

    --text-dim:#8B93A0;
    --text-faint:#5B6472;
    --brass:#C4A06A;
    --brass-dim:#9C8153;
    --brick:#B06A5C;
    --brick-dim:#8A544A;
    --neutral:#8B93A0;
    --serif:'Source Serif 4', Georgia, serif;
    --sans:'IBM Plex Sans', -apple-system, sans-serif;
    --mono:'IBM Plex Mono', 'SF Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:50;
    background:rgba(15,20,25,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--hairline);
    padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:10px;
  }
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .mark{
    font-family:var(--serif); font-weight:600; font-size:19px; letter-spacing:0.01em;
  }
  .brand .mark em{font-style:normal; color:var(--brass);}
  .brand .sub{font-size:11px; color:var(--text-faint); letter-spacing:0.08em; text-transform:uppercase;}
  .topbar-right{display:flex; align-items:center; gap:16px; font-size:12px; color:var(--text-dim);}
  .price-tag{font-family:var(--mono); font-size:14px; color:var(--text);}
  .price-tag .delta{color:var(--brass); font-size:12px; margin-left:6px;}
  .price-tag .delta.down{color:var(--brick);}
  .refresh-btn{
    background:transparent; border:1px solid var(--hairline); color:var(--text-dim);
    padding:6px 12px; border-radius:3px; font-size:12px; cursor:pointer;
    font-family:var(--sans); transition:border-color .2s, color .2s;
  }
  .refresh-btn:hover{border-color:var(--brass-dim); color:var(--brass);}
  .refresh-btn:active{transform:translateY(1px);}

  /* ---------- hero ---------- */
  .hero{
    padding:56px 24px 40px;
    max-width:1180px; margin:0 auto;
  }
  .hero-label{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--brass-dim); margin-bottom:10px;
  }
  .hero h1{
    font-family:var(--serif); font-weight:500; font-size:clamp(28px,4vw,42px);
    letter-spacing:-0.01em; max-width:820px; margin-bottom:14px;
  }
  .hero p.lede{
    color:var(--text-dim); max-width:640px; font-size:15px; margin-bottom:44px;
  }

  .gauges{
    display:grid; grid-template-columns:repeat(3,1fr); gap:1px;
    background:var(--hairline);
    border:1px solid var(--hairline);
    border-radius:6px; overflow:hidden;
  }
  .gauge-card{
    background:var(--panel); padding:28px 20px 22px; text-align:center;
    display:flex; flex-direction:column; align-items:center;
  }
  .gauge-card .horizon-label{
    font-size:12px; color:var(--text-dim); letter-spacing:0.06em; margin-bottom:2px;
  }
  .gauge-card .horizon-sub{
    font-size:10.5px; color:var(--text-faint); margin-bottom:14px;
  }
  .gauge-svg{width:170px; height:100px;}
  .gauge-score{
    font-family:var(--mono); font-size:34px; font-weight:600; margin-top:-38px;
  }
  .gauge-verdict{
    font-size:11.5px; color:var(--text-dim); margin-top:6px; letter-spacing:0.03em;
  }

  /* ---------- weight note ---------- */
  .weight-note{
    max-width:1180px; margin:0 auto; padding:0 24px 48px;
    font-size:12px; color:var(--text-faint); border-top:1px solid var(--hairline); padding-top:16px;
  }
  .weight-note b{color:var(--text-dim); font-weight:500;}

  /* ---------- factor grid ---------- */
  .section-wrap{max-width:1180px; margin:0 auto; padding:0 24px;}
  .section-heading{
    display:flex; align-items:baseline; gap:12px; margin:56px 0 20px;
  }
  .section-heading .num{font-family:var(--mono); color:var(--brass-dim); font-size:13px;}
  .section-heading h2{font-family:var(--serif); font-weight:500; font-size:22px;}

  .factor-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:1px;
    background:var(--hairline); border:1px solid var(--hairline); border-radius:6px; overflow:hidden;
    margin-bottom:8px;
  }
  .factor-card{
    background:var(--panel); padding:22px 20px; cursor:pointer;
    transition:background .18s;
    display:flex; flex-direction:column; gap:10px;
  }
  .factor-card:hover{background:var(--panel-raised);}
  .factor-card .eyebrow{font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-faint);}
  .factor-card .fname{font-family:var(--serif); font-size:19px; font-weight:600;}
  .factor-card .mini-scores{display:flex; gap:14px; margin-top:2px;}
  .mini-score{display:flex; flex-direction:column; gap:2px;}
  .mini-score .ms-label{font-size:9.5px; color:var(--text-faint);}
  .mini-score .ms-val{font-family:var(--mono); font-size:16px;}
  .factor-card .takeaway{font-size:12.5px; color:var(--text-dim); line-height:1.5; margin-top:2px;}

  .score-hi{color:var(--brass);}
  .score-mid{color:var(--neutral);}
  .score-lo{color:var(--brick);}

  /* ---------- detail sections ---------- */
  .detail{
    background:var(--panel); border:1px solid var(--hairline); border-radius:6px;
    padding:32px 28px; margin-bottom:20px; scroll-margin-top:80px;
  }
  .detail-head{
    display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px;
    margin-bottom:22px; padding-bottom:20px; border-bottom:1px solid var(--hairline);
  }
  .detail-head .eyebrow{font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--brass-dim); margin-bottom:6px;}
  .detail-head h3{font-family:var(--serif); font-size:26px; font-weight:600;}
  .score-row{display:flex; gap:22px;}
  .score-chip{text-align:center;}
  .score-chip .sc-h{font-size:10.5px; color:var(--text-faint); letter-spacing:0.04em;}
  .score-chip .sc-v{font-family:var(--mono); font-size:24px; font-weight:600;}

  .warning-banner{
    background:rgba(176,106,92,0.1); border:1px solid rgba(176,106,92,0.35);
    color:#D3A79E; font-size:12.5px; padding:10px 14px; border-radius:4px; margin-bottom:20px;
  }

  .narrative-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:22px; margin-bottom:28px;
  }
  .narrative-col .nh{
    font-size:12px; color:var(--text-dim); font-weight:600; letter-spacing:0.02em;
    margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--hairline);
  }
  .narrative-col p{font-size:13px; color:var(--text-dim); line-height:1.75;}

  table.data-table{width:100%; border-collapse:collapse; font-size:13px;}
  table.data-table th{
    text-align:left; font-weight:500; color:var(--text-faint); font-size:11px;
    letter-spacing:0.04em; text-transform:uppercase; padding:8px 10px;
    border-bottom:1px solid var(--hairline);
  }
  table.data-table td{
    padding:10px 10px; border-bottom:1px solid rgba(42,50,60,0.5); color:var(--text-dim);
  }
  table.data-table td.name{color:var(--text); font-weight:500;}
  table.data-table td.latest{font-family:var(--mono); color:var(--text);}
  table.data-table tr:last-child td{border-bottom:none;}
  table.data-table td.src{font-size:11px; color:var(--text-faint); font-family:var(--mono);}

  footer{
    max-width:1180px; margin:40px auto 0; padding:24px 24px 40px;
    border-top:1px solid var(--hairline); font-size:11.5px; color:var(--text-faint);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }

    .gauges{grid-template-columns:1fr;}
    .factor-grid{grid-template-columns:1fr;}
    .narrative-grid{grid-template-columns:1fr;}
    .score-row{gap:14px;}
  }

  ::selection{background:var(--brass-dim); color:#0F1419;}
</style>
</head>

<script>
const FACTOR_ORDER = ["usd","rate","etf","cb","vol","ta"];
const FACTOR_KEY_LABEL = { usd:"美元指数", rate:"利率", etf:"ETF", cb:"央行购金", vol:"波动率", ta:"技术分析" };
const HORIZONS = ["短期","中短期","中期"];
const HORIZON_SUB = { "短期":"1周", "中短期":"2-3周", "中期":"2-3个月" };

let DATA = null;

// 部署 Cloudflare Worker 后,把下面这个 URL 换成实际地址,
// 手动刷新按钮就会先触发 GitHub Actions 重新拉数据,再读取 data.json。
// 部署前留空即可,此时刷新按钮只会重新读取当前的 data.json。
const TRIGGER_WORKER_URL = "";

function scoreClass(v){
  if(v >= 6.5) return "score-hi";
  if(v >= 4.5) return "score-mid";
  return "score-lo";
}
function scoreColor(v){
  if(v >= 6.5) return "#C4A06A";
  if(v >= 4.5) return "#8B93A0";
  return "#B06A5C";
}
function verdictText(v){
  if(v >= 7) return "偏多";
  if(v >= 5.5) return "中性偏多";
  if(v >= 4.5) return "中性";
  if(v >= 3) return "中性偏空";
  return "偏空";
}

function makeGaugeSVG(score, color){
  // semicircle gauge, 0-10 mapped to -90deg..+90deg
  const angle = -90 + (score/10)*180;
  const rad = angle * Math.PI/180;
  const cx=85, cy=88, r=68;
  const needleX = cx + r*0.82*Math.sin(rad);
  const needleY = cy - r*0.82*Math.cos(rad);
  // arc path (background track), semicircle from -90 to +90
  const startX = cx + r*Math.sin(-Math.PI/2), startY = cy - r*Math.cos(-Math.PI/2);
  const endX = cx + r*Math.sin(Math.PI/2), endY = cy - r*Math.cos(Math.PI/2);
  // progress arc
  const progEndX = cx + r*Math.sin(rad), progEndY = cy - r*Math.cos(rad);
  const largeArc = (angle - (-90)) > 180 ? 1 : 0;
  return `
  <svg class="gauge-svg" viewBox="0 0 170 100">
    <path d="M ${startX} ${startY} A ${r} ${r} 0 0 1 ${endX} ${endY}" fill="none" stroke="#2A323C" stroke-width="9" stroke-linecap="round"/>
    <path d="M ${startX} ${startY} A ${r} ${r} 0 ${largeArc} 1 ${progEndX} ${progEndY}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="${color}"/>
    <line x1="${cx}" y1="${cy}" x2="${needleX}" y2="${needleY}" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
  </svg>`;
}

function render(){
  document.getElementById('as-of-label').textContent = DATA.asOfLabel + ' 更新';
  document.getElementById('gold-latest').textContent = '$' + DATA.goldPrice.latest.toFixed(1);
  const dEl = document.getElementById('gold-delta');
  const up = DATA.goldPrice.change1d >= 0;
  dEl.textContent = (up?'+':'') + DATA.goldPrice.change1d.toFixed(1) + ' (' + (up?'+':'') + DATA.goldPrice.changePct1d.toFixed(2) + '%)';
  dEl.className = 'delta' + (up ? '' : ' down');

  // gauges
  const gaugesEl = document.getElementById('gauges');
  gaugesEl.innerHTML = HORIZONS.map(h=>{
    const v = DATA.composite[h];
    const color = scoreColor(v);
    return `<div class="gauge-card">
      <div class="horizon-label">${h}</div>
      <div class="horizon-sub">${HORIZON_SUB[h]}</div>
      ${makeGaugeSVG(v,color)}
      <div class="gauge-score" style="color:${color}">${v.toFixed(2)}</div>
      <div class="gauge-verdict">${verdictText(v)}</div>
    </div>`;
  }).join('');

  // weight note
  const w = DATA.weights;
  document.getElementById('weight-note').innerHTML = `<b>权重说明：</b> 短期权重技术分析占30%（其余四项各17.5%，央行购金不参与）；中短期五项均分各20%（央行购金不参与）；中期六项均分各16.7%。央行购金数据频率为月/季度，仅在中期维度计入综合分。`;

  // factor grid
  const gridEl = document.getElementById('factor-grid');
  gridEl.innerHTML = FACTOR_ORDER.map(key=>{
    const f = DATA.factors[key];
    const miniScores = HORIZONS.map(h=>{
      const v = f.scores[h];
      const disabled = f.onlyMediumTerm && h!=="中期";
      return `<div class="mini-score">
        <div class="ms-label">${h}</div>
        <div class="ms-val ${disabled?'':scoreClass(v)}" style="${disabled?'color:#4A5058':''}">${disabled ? '—' : v.toFixed(1)}</div>
      </div>`;
    }).join('');
    return `<div class="factor-card" onclick="document.getElementById('detail-${key}').scrollIntoView()">
      <div class="eyebrow">${f.eyebrow}</div>
      <div class="fname">${f.name}</div>
      <div class="mini-scores">${miniScores}</div>
      <div class="takeaway">${f.takeaway}</div>
    </div>`;
  }).join('');

  // detail sections
  const detailWrap = document.getElementById('detail-wrap');
  // remove old details if re-rendering
  document.querySelectorAll('.detail').forEach(el=>el.remove());
  FACTOR_ORDER.forEach((key, idx)=>{
    const f = DATA.factors[key];
    const el = document.createElement('div');
    el.className = 'detail';
    el.id = 'detail-'+key;

    const scoreChips = HORIZONS.map(h=>{
      const v = f.scores[h];
      const disabled = f.onlyMediumTerm && h!=="中期";
      return `<div class="score-chip">
        <div class="sc-h">${h}<br>${HORIZON_SUB[h]}</div>
        <div class="sc-v ${disabled?'':scoreClass(v)}" style="${disabled?'color:#4A5058':''}">${disabled?'—':v.toFixed(1)}</div>
      </div>`;
    }).join('');

    const warningHtml = f.warning ? `<div class="warning-banner">⚠ ${f.warning}</div>` : '';

    const narrativeHtml = HORIZONS.map(h=>{
      return `<div class="narrative-col">
        <div class="nh">${h}（${HORIZON_SUB[h]}）</div>
        <p>${f.narrative[h]}</p>
      </div>`;
    }).join('');

    const tableRows = f.indicators.map(ind=>{
      return `<tr>
        <td class="name">${ind.name}</td>
        <td class="latest">${ind.latest}${ind.unit?' '+ind.unit:''}</td>
        <td>${ind.change}</td>
        <td class="src">${ind.chartId||''}</td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="detail-head">
        <div>
          <div class="eyebrow">${f.eyebrow}</div>
          <h3>${String(idx+1).padStart(2,'0')} · ${f.name}</h3>
        </div>
        <div class="score-row">${scoreChips}</div>
      </div>
      ${warningHtml}
      <div class="narrative-grid">${narrativeHtml}</div>
      <table class="data-table">
        <thead><tr><th>指标</th><th>最新值</th><th>变化 / 解读</th><th>来源图表</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    `;
    detailWrap.appendChild(el);
  });
}

function loadEmbedded(){
  DATA = JSON.parse(document.getElementById('embedded-data').textContent);
  render();
}

async function tryFetchLive(triggeredByUser){
  const btn = document.getElementById('refresh-btn');
  const orig = btn.textContent;

  // 用户主动点击、且已配置 Worker 地址时,先触发后台重新抓取
  if(triggeredByUser && TRIGGER_WORKER_URL){
    btn.textContent = '↻ 正在触发刷新…';
    try{
      await fetch(TRIGGER_WORKER_URL, {method:'GET'});
      btn.textContent = '✓ 已触发,1-2分钟后生效';
      setTimeout(()=>{ btn.textContent = orig; }, 3000);
      return; // 不用等 GitHub Actions 跑完,数据要稍后才会更新
    }catch(e){
      // 触发失败就退化成普通的 data.json 读取
    }
  }

  btn.textContent = '↻ 刷新中…';
  try{
    const res = await fetch('data.json?t=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('no data.json');
    const json = await res.json();
    DATA = json;
    render();
    btn.textContent = '✓ 已更新';
  }catch(e){
    btn.textContent = triggeredByUser ? '当前为最新快照' : orig;
  }
  if(triggeredByUser) setTimeout(()=>{ btn.textContent = orig; }, 2200);
}

document.getElementById('refresh-btn').addEventListener('click', ()=>tryFetchLive(true));

loadEmbedded();
// attempt a silent live fetch on load in case data.json sits alongside this file with newer data
tryFetchLive(false);
</script>
